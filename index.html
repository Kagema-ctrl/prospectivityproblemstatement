<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeoAI Prospectivity</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@300;400;600;700&family=Nunito:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --r1: #6d1535;
    --r2: #a3224f;
    --r3: #c94475;
    --r4: #de6b93;
    --r5: #ed96b4;
    --r6: #f4bace;
    --core: #fef2f6;
    --text-dark: #3a0a1e;
    --text-mid:  #7a3050;
    --text-light:#c07090;
    --white: #ffffff;
  }

  body {
    font-family: 'Nunito Sans', 'Avenir Next', 'Century Gothic', 'Trebuchet MS', sans-serif;
    background: #fdf5f7;
    color: var(--text-dark);
    width: 100%;
    max-width: 900px;
    margin: 0 auto;
    padding: 20px clamp(14px, 4vw, 40px) 28px;
  }

  h1 {
    font-family: 'Nunito', 'Avenir Next', sans-serif;
    font-size: clamp(0.9rem, 2.4vw, 1.2rem);
    font-weight: 700;
    color: var(--r1);
    text-align: center;
    letter-spacing: 0.01em;
    line-height: 1.3;
    margin-bottom: 4px;
  }
  .subtitle {
    text-align: center;
    font-size: clamp(0.58rem, 1.4vw, 0.7rem);
    color: var(--text-light);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 14px;
    font-weight: 400;
  }

  .legend {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 10px 18px;
    margin-bottom: 16px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: clamp(0.58rem, 1.4vw, 0.68rem);
    color: var(--text-mid);
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .legend-dot {
    width: 9px; height: 9px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* Single-column default (phones) */
  .layout {
    display: flex;
    flex-direction: column;
  }
  .layout-left {
    width: 100%;
    max-width: 420px;
    margin: 0 auto;
  }
  .layout-right {
    width: 100%;
  }

  .circle-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: 12px;
  }

  svg.main-circle {
    display: block;
    width: 100%;
    height: auto;
    overflow: visible;
  }

  .ring {
    cursor: pointer;
    transition: opacity 0.18s, filter 0.18s;
  }
  .ring:hover, .ring.active {
    opacity: 0.85;
    filter: brightness(1.12) drop-shadow(0 0 7px rgba(169,34,79,0.45));
  }

  .hint {
    text-align: center;
    font-size: clamp(0.54rem, 1.3vw, 0.63rem);
    color: var(--text-light);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .info-card {
    background: var(--white);
    border-radius: 10px;
    padding: 14px 16px;
    min-height: 100px;
    border-left: 3px solid var(--r3);
    box-shadow: 0 2px 12px rgba(109,21,53,0.09);
    transition: border-color 0.25s, opacity 0.25s, transform 0.2s;
    opacity: 0;
    transform: translateY(4px);
  }
  .info-card.visible {
    opacity: 1;
    transform: translateY(0);
  }
  .card-stage {
    font-size: clamp(0.54rem, 1.3vw, 0.62rem);
    font-weight: 700;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    margin-bottom: 5px;
    color: var(--text-light);
  }
  .card-title {
    font-family: 'Nunito', 'Avenir Next', sans-serif;
    font-size: clamp(0.85rem, 2.1vw, 1rem);
    font-weight: 700;
    color: var(--r1);
    margin-bottom: 6px;
    line-height: 1.25;
  }
  .card-desc {
    font-size: clamp(0.72rem, 1.7vw, 0.82rem);
    color: var(--text-mid);
    line-height: 1.6;
    font-weight: 400;
  }

  .footer {
    text-align: center;
    margin-top: 16px;
    font-family: 'Nunito', 'Avenir Next', sans-serif;
    font-style: italic;
    font-size: clamp(0.68rem, 1.7vw, 0.8rem);
    color: var(--r2);
    line-height: 1.5;
  }

  /* Tablet and up: side-by-side */
  @media (min-width: 660px) {
    .layout {
      flex-direction: row;
      align-items: flex-start;
      gap: clamp(20px, 4vw, 52px);
    }
    .layout-left {
      flex: 0 0 clamp(240px, 44%, 400px);
      max-width: none;
      margin: 0;
    }
    .layout-right {
      flex: 1;
      padding-top: 6px;
    }
    .hint { margin-bottom: 0; }
    .footer { text-align: left; }
    .info-card { min-height: 150px; }
  }
</style>
</head>
<body>

<h1>From Challenge to Spatial Intelligence</h1>
<p class="subtitle">Hover a ring to explore</p>

<div class="legend">
  <div class="legend-item">
    <div class="legend-dot" style="background:var(--r1)"></div> Problem
  </div>
  <div class="legend-item">
    <div class="legend-dot" style="background:var(--r4)"></div> GeoAI Action
  </div>
  <div class="legend-item">
    <div class="legend-dot" style="background:var(--r6)"></div> Solution
  </div>
</div>

<div class="layout">
  <div class="layout-left">
    <div class="circle-wrap">
      <svg class="main-circle" viewBox="0 0 260 234">

        <!-- All ellipses share top at y=6; cy = 6 + ry; ~22px spacing between rings -->
        <ellipse class="ring" cx="130" cy="116" rx="124" ry="110" fill="var(--r1)"
          data-stage="Problem" data-color="#6d1535"
          data-title="3,479 km² of Underexplored Ground"
          data-desc="Kakamega County hosts one of East Africa's most significant Archaean greenstone belts — yet the vast majority has never been systematically evaluated. Scale alone defeats traditional methods."/>

        <ellipse class="ring" cx="130" cy="96" rx="102" ry="90" fill="var(--r2)"
          data-stage="Problem" data-color="#a3224f"
          data-title="Multi-Source Data Held in Silos"
          data-desc="The global AI in mining market was valued at $29.94 billion in 2024 and is projected to reach $685 billion by 2033 — driven by exactly this: fusing massive geoscientific datasets at unprecedented speed.This model integrates geology, structural proximity, 10 orogenic gold pathfinder elements, Sentinel-2 alteration indices, and terrain derivatives — standardised to 10m resolution — into a single predictor stack no human team could evaluate simultaneously."/>

        <ellipse class="ring" cx="130" cy="76" rx="80" ry="70" fill="var(--r3)"
          data-stage="GeoAI Action" data-color="#c94475"
          data-title="ArcGIS Ecosystem as Unified Pipeline"
          data-desc="ArcGIS Pro, Notebooks, Dashboards, Experience Builder, and Survey123 form a complete pipeline — from raw data ingestion to stakeholder-ready outputs — all within a single integrated platform."/>

        <ellipse class="ring" cx="130" cy="58" rx="60" ry="52" fill="var(--r4)"
          data-stage="GeoAI Action" data-color="#de6b93"
          data-title="60+ Geoscientific Predictors Fused"
          data-desc="Geology, structural datasets, geochemical datasets, including 10 gold pathfinder elements, Sentinel-2 alteration indices, and terrain derivatives — standardised to 10m resolution and fused into one predictor stack."/>

        <ellipse class="ring" cx="130" cy="42" rx="42" ry="36" fill="var(--r5)"
          data-stage="GeoAI Action" data-color="#ed96b4"
          data-title="Random Forest + SVM — Dual Validation"
          data-desc="Traditional exploration involves extensive manual labour and high costs. Machine learning replaces that with algorithms capable of predicting mineral deposits with remarkable precision. Two independent models — RF (AUC: 0.981) and SVM (AUC: 0.975) — trained on 68 confirmed gold occurrences, cross-validated spatially. Where both agree, confidence is highest."/>

        <ellipse class="ring" cx="130" cy="28" rx="24" ry="22" fill="var(--r6)"
          data-stage="Solution" data-color="#f4bace"
          data-title="County-Wide Prospectivity Map"
          data-desc="Five classified zones — Very Low to Very High — published to ArcGIS Hub with interactive dashboards and a StoryMap investor narrative. Updated as new field data arrives via Survey123."/>

        <ellipse class="ring" cx="130" cy="16" rx="11" ry="10" fill="var(--core)" stroke="var(--r6)" stroke-width="1.5"
          data-stage="Solution" data-color="#f4bace"
          data-title="131 km² — Drill with Confidence"
          data-desc="131 km² of high-confidence, unlicensed ground open for investment, according to RF model. 202.4 km² where both models agree. Your exploration budget goes exactly where the data says it should."/>


      </svg>
    </div>
    <p class="hint">&#8593; the power of GeoAI in Prospectivity</p>
  </div>

  <div class="layout-right">
    <div class="info-card" id="info-card">
      <div class="card-stage" id="card-stage"></div>
      <div class="card-title" id="card-title"></div>
      <div class="card-desc"  id="card-desc"></div>
    </div>
    <div class="footer">The geology was always there.<br>GeoAI is how we read it at full resolution.</div>
  </div>
</div>

<script>
  const card  = document.getElementById('info-card');
  const stage = document.getElementById('card-stage');
  const ttl   = document.getElementById('card-title');
  const dsc   = document.getElementById('card-desc');
  let active = null;

  document.querySelectorAll('.ring').forEach(r => {
    ['mouseenter','click'].forEach(evt => {
      r.addEventListener(evt, () => {
        stage.textContent      = r.dataset.stage;
        ttl.textContent        = r.dataset.title;
        dsc.textContent        = r.dataset.desc;
        card.style.borderColor = r.dataset.color;
        card.classList.add('visible');
        if (active) active.classList.remove('active');
        r.classList.add('active');
        active = r;
      });
    });
  });
</script>
</body>
</html>
